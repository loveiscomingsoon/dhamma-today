<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>ล้างแคชธรรมะวันนี้</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        margin: 0;
        padding: 24px;
        color: #5b4939;
        background: #fff7ed;
      }

      main {
        width: min(100%, 360px);
        text-align: center;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.45rem;
      }

      p {
        margin: 0;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>กำลังล้างแคชแอป</h1>
      <p>รอสักครู่ แล้วจะเปิดธรรมะวันนี้เวอร์ชันล่าสุดให้อัตโนมัติ</p>
    </main>
    <script>
      async function resetAppCache() {
        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }

        if ("caches" in window) {
          const names = await caches.keys();
          await Promise.all(names.map((name) => caches.delete(name)));
        }

        location.replace("./?build=20260626-motion-cover-v2");
      }

      resetAppCache().catch(() => {
        location.replace("./?build=20260626-motion-cover-v2");
      });
    </script>
  </body>
</html>
