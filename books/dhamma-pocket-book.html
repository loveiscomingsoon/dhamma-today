<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>ธรรมะพกพา เล่ม 1 | Online Pocket Book</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
    <link rel="stylesheet" href="./pocket-book.css?v=20260625-6">
  </head>
  <body>
    <div class="reader-shell">
      <header class="reader-header">
        <a class="back-link" href="../index.html" aria-label="กลับสู่แอปธรรมะวันนี้">
          <span aria-hidden="true">‹</span>
          ธรรมะวันนี้
        </a>
        <div class="reader-brand">
          <img src="../assets/crane-monkey-mark.png" alt="">
          <div>
            <strong>ธรรมะพกพา</strong>
            <small>Pocket Dhamma Book</small>
          </div>
        </div>
        <button class="text-button" id="printBook" type="button">บันทึก PDF</button>
      </header>

      <main class="reader-main" aria-live="polite">
        <section class="book-stage" aria-label="หนังสือธรรมะพกพาแบบออนไลน์">
          <button class="turn-button previous" id="prevPage" type="button" aria-label="หน้าก่อนหน้า">
            <span aria-hidden="true">‹</span>
          </button>

          <article class="book-page" id="bookPage" tabindex="-1"></article>

          <button class="turn-button next" id="nextPage" type="button" aria-label="หน้าถัดไป">
            <span aria-hidden="true">›</span>
          </button>
        </section>

        <section class="reader-controls" aria-label="ควบคุมการอ่าน">
          <div class="page-status">
            <span id="pageLabel">หน้า 1</span>
            <small id="pageHint">ใช้ปุ่มซ้าย/ขวาเพื่อเปิดหน้า</small>
          </div>
          <input id="pageSlider" type="range" min="1" value="1" aria-label="เลือกหน้าหนังสือ">
          <div class="quick-actions">
            <button class="pill-button" id="coverPage" type="button">ปก</button>
            <button class="pill-button" id="randomPage" type="button">สุ่มข้อธรรม</button>
            <button class="pill-button" id="sourcesToggle" type="button" aria-pressed="false">แหล่งอ้างอิง</button>
          </div>
        </section>
      </main>

      <footer class="reader-footer">
        <p>เรียบเรียงหลักธรรมและคำสอน จากครูอาจารย์ โดย นกกระยางขาว</p>

        <a href="mailto:loveiscomingsoon@gmail.com">ติดต่อหรือแจ้งการนำผลงานไปใช้</a>
        <span aria-hidden="true"> · </span><a href="tel:0992966166">โทร 099-296-6166</a>
      </footer>
    </div>

    <section class="print-book" id="printBookContent" aria-label="ฉบับพิมพ์"></section>

    <script src="../content/dhamma-library.js?v=20260620-22"></script>
    <script src="./pocket-book.js?v=20260625-6"></script>
